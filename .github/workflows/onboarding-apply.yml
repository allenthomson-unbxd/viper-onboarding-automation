name: Onboarding — apply

on:
  repository_dispatch:
    types: [onboarding-apply]

concurrency:
  group: onboarding-apply-${{ github.event.client_payload.draft_id }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Show dispatch payload
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          echo "repository_dispatch payload:"
          echo "$PAYLOAD"

      - name: Checkout automation repo (scripts)
        uses: actions/checkout@v4

