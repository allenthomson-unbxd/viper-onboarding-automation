name: Onboarding — apply

on:
  repository_dispatch:
    types: [onboarding-apply]

concurrency:
  group: onboarding-apply-${{ github.event.client_payload.draft_id }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Show dispatch payload
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          echo "repository_dispatch payload:"
          echo "$PAYLOAD"

      - name: Checkout automation repo (scripts)
        uses: actions/checkout@v4

      # --- Next steps ---
      # - Optional: GET approved bundle from Viper (new endpoint + auth TBD).
      # - Clone solution-jobs (v3 / configured ref) using secrets.GH_CLONE_TOKEN.
      # - Branch: e.g. onboarding/<site_key>-<draft_id short>
      # - Copy customer folder from checkout or artifact, commit, push.
      # - gh pr create (token needs contents + pull_requests on solution-jobs).

      - name: Placeholder — mark job visible in Actions UI
        run: echo "apply stub complete for draft_id=${{ github.event.client_payload.draft_id }}"
