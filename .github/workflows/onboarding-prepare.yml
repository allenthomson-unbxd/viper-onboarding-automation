# Copy to viper-onboarding-automation/.github/workflows/onboarding-prepare.yml
#
# When VIPER_CHECKOUT_REPO secret is non-empty (exposed as job env for if:): clones viper + feed-conversion, runs
# cookiecutter per onboarding/baseoverlay.yml, merges, POSTs ingest-prepare.
# Otherwise: server-only flow (GET prepare-context returns proposed_files from Viper).
#
# Secrets: VIPER_INTERNAL_BASE_URL, ONBOARDING_INGEST_HMAC_SECRET, GH_CLONE_TOKEN
# Optional: FEED_CONVERSION_REPO (else ``allenthomson-unbxd/feed-conversion`` for clone + release tags), VIPER_CHECKOUT_REPO (viper clone for merge)
# Optional repo variable VIPER_CHECKOUT_REF: branch/tag/SHA; if unset, default branch is resolved via gh api.
# Optional repo variable VIPER_RELEASE_REPO: owner/repo used only for GitHub Releases (viper image tag).
#   If unset, falls back to VIPER_CHECKOUT_REPO, then ``allenthomson-unbxd/viper``.
# GH_CLONE_TOKEN: PAT with repo read to private forks; if unset, github.token is used (public repos only).
#
# Release / image tag resolution (``release_image_tags`` then ``fc_tag`` for feed clone ref):
#   Repos: feed = FEED_CONVERSION_REPO secret or ``allenthomson-unbxd/feed-conversion``; viper =
#   VIPER_RELEASE_REPO var or VIPER_CHECKOUT_REPO secret or ``allenthomson-unbxd/viper``.
#   Order per repo: (1) Releases, (2) GraphQL newest tag by date, (3) REST /tags (version-sorted),
#   (4) ``git ls-remote`` (private repos often succeed here), (5) vars FEED_CONVERSION_FALLBACK_IMAGE_TAG / VIPER_FALLBACK_IMAGE_TAG.
#   If CI still passes no tag, Viper ``prepare-context`` uses ``ONBOARDING_*_IMAGE_TAG`` env on the server.

name: onboarding-prepare

on:
  repository_dispatch:
    types: [onboarding-prepare]

jobs:
  prepare:
    runs-on: ubuntu-latest
    # secrets cannot be used in step `if:`; mirror into env for conditional steps.
    env:
      VIPER_CHECKOUT_REPO: ${{ secrets.VIPER_CHECKOUT_REPO }}
      FEED_CONVERSION_REPO: ${{ secrets.FEED_CONVERSION_REPO }}
      VIPER_RELEASE_REPO: ${{ vars.VIPER_RELEASE_REPO }}
      # Empty PAT would override checkout's default token; fall back for public clones.
      GH_CLONE_TOKEN: ${{ secrets.GH_CLONE_TOKEN != '' && secrets.GH_CLONE_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v4

      - id: release_image_tags
        env:
          GH_TOKEN: ${{ env.GH_CLONE_TOKEN }}
          FEED_TAG_FALLBACK_VAR: ${{ vars.FEED_CONVERSION_FALLBACK_IMAGE_TAG }}
          VIPER_TAG_FALLBACK_VAR: ${{ vars.VIPER_FALLBACK_IMAGE_TAG }}
        run: |
          set -euo pipefail
          FEED_R="${FEED_CONVERSION_REPO:-}"
          [ -z "${FEED_R}" ] && FEED_R="allenthomson-unbxd/feed-conversion"
          VIPER_R="${VIPER_RELEASE_REPO:-}"
          [ -z "${VIPER_R}" ] && VIPER_R="${VIPER_CHECKOUT_REPO:-}"
          [ -z "${VIPER_R}" ] && VIPER_R="allenthomson-unbxd/viper"

          tag_from_releases() {
            local repo="$1"
            local j j2
            j=$(gh api "repos/${repo}/releases/latest" 2>/dev/null || true)
            if echo "${j}" | jq -e 'has("tag_name") and (.tag_name | type == "string") and (.tag_name != "") and (.tag_name != "null")' >/dev/null 2>&1; then
              echo "${j}" | jq -r .tag_name
              return 0
            fi
            j2=$(gh api "repos/${repo}/releases?per_page=1" 2>/dev/null || true)
            if echo "${j2}" | jq -e 'type == "array" and length > 0 and (.[0].tag_name | type == "string") and (.[0].tag_name != "") and (.[0].tag_name != "null")' >/dev/null 2>&1; then
              echo "${j2}" | jq -r '.[0].tag_name'
              return 0
            fi
            echo ""
          }

          # Newest tag by tagged date (GraphQL); tolerate null repository (no access / wrong name).
          tag_from_newest_git_tag() {
            local repo="$1"
            local owner="${repo%%/*}"
            local name="${repo#*/}"
            local out gql
            gql='query($owner:String!,$name:String!){repository(owner:$owner,name:$name){refs(refPrefix:"refs/tags/",first:1,orderBy:{field:TAGGED_DATE,direction:DESC}){nodes{name}}}}'
            out=$(gh api graphql -f query="$gql" -f owner="$owner" -f name="$name" 2>/dev/null || true)
            if echo "${out}" | jq -e '(.data.repository // empty | .refs.nodes // []) | length > 0' >/dev/null 2>&1; then
              echo "${out}" | jq -r '(.data.repository // empty | .refs.nodes[0].name // empty)' | sed 's#^refs/tags/##'
              return 0
            fi
            echo ""
          }

          # REST list tags (up to 100); pick highest by version sort (GNU sort -V on ubuntu-latest).
          tag_from_rest_tags() {
            local repo="$1"
            local j best
            j=$(gh api "repos/${repo}/tags?per_page=100" 2>/dev/null || true)
            if ! echo "${j}" | jq -e 'type == "array" and length > 0' >/dev/null 2>&1; then
              echo ""
              return 0
            fi
            best=$(echo "${j}" | jq -r '.[].name' 2>/dev/null | grep -E '^[^[:space:]]+$' | sort -V | tail -n1)
            if [ -n "${best}" ] && [ "${best}" != "null" ]; then
              echo "${best}"
              return 0
            fi
            echo ""
          }

          # HTTPS ls-remote (works for many private repos when API tag listing is empty or blocked).
          tag_from_git_ls_remote() {
            local repo="$1"
            local url t
            url="https://x-access-token:${GH_TOKEN}@github.com/${repo}.git"
            t=$(
              GIT_TERMINAL_PROMPT=0 git ls-remote --tags "$url" 2>/dev/null \
                | awk -F'\t' '$2 ~ /^refs\/tags\// && $2 !~ /\^{}$/ { sub(/^refs\/tags\//, "", $2); print $2 }' \
                | sort -V | tail -n1
            )
            if [ -n "${t}" ]; then
              echo "${t}"
              return 0
            fi
            echo ""
          }

          resolve_tag() {
            local repo="$1"
            local t
            t=$(tag_from_releases "${repo}")
            if [ -n "${t}" ] && [ "${t}" != "null" ]; then
              echo "${t}"
              return 0
            fi
            t=$(tag_from_newest_git_tag "${repo}")
            if [ -n "${t}" ] && [ "${t}" != "null" ]; then
              echo "${t}"
              return 0
            fi
            t=$(tag_from_rest_tags "${repo}")
            if [ -n "${t}" ] && [ "${t}" != "null" ]; then
              echo "${t}"
              return 0
            fi
            t=$(tag_from_git_ls_remote "${repo}")
            if [ -n "${t}" ] && [ "${t}" != "null" ]; then
              echo "${t}"
              return 0
            fi
            echo ""
          }

          fc_img=$(resolve_tag "${FEED_R}")
          vp_img=$(resolve_tag "${VIPER_R}")
          if [ -z "${fc_img}" ] && [ -n "${FEED_TAG_FALLBACK_VAR:-}" ]; then
            fc_img="${FEED_TAG_FALLBACK_VAR}"
          fi
          if [ -z "${vp_img}" ] && [ -n "${VIPER_TAG_FALLBACK_VAR:-}" ]; then
            vp_img="${VIPER_TAG_FALLBACK_VAR}"
          fi

          echo "feed_conversion_image_tag=${fc_img}" >> "$GITHUB_OUTPUT"
          echo "viper_image_tag=${vp_img}" >> "$GITHUB_OUTPUT"
          echo "=== Onboarding prepare: image tag lookup (prepare-context query params) ==="
          echo "repos: feed-conversion=${FEED_R} viper=${VIPER_R}"
          echo "resolved tags (Releases → GraphQL tag → REST /tags → git ls-remote → vars …_FALLBACK_IMAGE_TAG; empty → Viper env):"
          echo "  feed-conversion image tag: ${fc_img:-<none>}"
          echo "  viper image tag:           ${vp_img:-<none>}"
          if [ -z "${fc_img}" ]; then
            if ! gh api "repos/${FEED_R}" --jq .id >/dev/null 2>&1; then
              echo "::warning::feed-conversion: cannot read repo \"${FEED_R}\" with current token (404/forbidden). Fix FEED_CONVERSION_REPO secret, add GH_CLONE_TOKEN PAT with repo read, or set FEED_CONVERSION_FALLBACK_IMAGE_TAG."
            else
              echo "::warning::feed-conversion: repo readable but no tag found (no releases/tags, or tag names not sortable). Set FEED_CONVERSION_FALLBACK_IMAGE_TAG."
            fi
          fi
          if [ -z "${vp_img}" ]; then
            if ! gh api "repos/${VIPER_R}" --jq .id >/dev/null 2>&1; then
              echo "::warning::viper: cannot read repo \"${VIPER_R}\" with current token. Fix GH_CLONE_TOKEN or set VIPER_FALLBACK_IMAGE_TAG."
            else
              echo "::warning::viper: repo readable but no tag resolved. Set VIPER_FALLBACK_IMAGE_TAG or add semver-like git tags."
            fi
          fi

      - id: fc_tag
        env:
          GH_TOKEN: ${{ env.GH_CLONE_TOKEN }}
          FEED_IMG: ${{ steps.release_image_tags.outputs.feed_conversion_image_tag }}
        run: |
          set -euo pipefail
          TAG=""
          FEED_REPO="${FEED_CONVERSION_REPO:-}"
          [ -z "${FEED_REPO}" ] && FEED_REPO="allenthomson-unbxd/feed-conversion"
          if [ -n "${FEED_IMG:-}" ] && [ "${FEED_IMG}" != "null" ]; then
            TAG="${FEED_IMG}"
          else
            json=$(gh api "repos/${FEED_REPO}/releases/latest" 2>/dev/null || true)
            if echo "${json}" | jq -e 'has("tag_name") and (.tag_name | type == "string")' >/dev/null 2>&1; then
              TAG=$(echo "${json}" | jq -r .tag_name)
            fi
            if [ -z "${TAG}" ] || [ "${TAG}" = "null" ]; then
              TAG=$(gh api "repos/${FEED_REPO}" --jq .default_branch)
            fi
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - id: viper_ref
        if: ${{ env.VIPER_CHECKOUT_REPO != '' }}
        env:
          VIPER_REPO: ${{ secrets.VIPER_CHECKOUT_REPO }}
          REF_OVERRIDE: ${{ vars.VIPER_CHECKOUT_REF }}
          GH_TOKEN: ${{ env.GH_CLONE_TOKEN }}
        run: |
          set -euo pipefail
          REF="${REF_OVERRIDE}"
          if [ -z "${REF}" ]; then
            REF=$(gh api "repos/${VIPER_REPO}" --jq .default_branch)
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Checkout viper (for local merge)
        if: ${{ env.VIPER_CHECKOUT_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.VIPER_CHECKOUT_REPO }}
          ref: ${{ steps.viper_ref.outputs.ref }}
          path: viper
          token: ${{ env.GH_CLONE_TOKEN }}

      - name: Checkout feed-conversion
        if: ${{ env.VIPER_CHECKOUT_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.FEED_CONVERSION_REPO != '' && secrets.FEED_CONVERSION_REPO || 'allenthomson-unbxd/feed-conversion' }}
          ref: ${{ steps.fc_tag.outputs.tag }}
          path: feed-conversion
          token: ${{ env.GH_CLONE_TOKEN }}

      - name: Install merge tooling
        if: ${{ env.VIPER_CHECKOUT_REPO != '' }}
        run: |
          set -euo pipefail
          REQ="viper/onboarding/requirements-ci.txt"
          if [ -f "${REQ}" ]; then
            pip install -r "${REQ}"
          else
            # Checked-out Viper ref may predate onboarding/requirements-ci.txt; keep in sync with that file.
            pip install 'cookiecutter>=2.6.0' 'PyYAML>=6.0.2'
          fi

      - name: Local cookiecutter merge + ingest
        if: ${{ env.VIPER_CHECKOUT_REPO != '' }}
        env:
          VIPER_BASE: ${{ secrets.VIPER_INTERNAL_BASE_URL }}
          HMAC_SECRET: ${{ secrets.ONBOARDING_INGEST_HMAC_SECRET }}
          DRAFT_ID: ${{ github.event.client_payload.draft_id }}
          FEED_CONVERSION_TAG: ${{ steps.fc_tag.outputs.tag }}
          PREPARE_FEED_IMAGE_TAG: ${{ steps.release_image_tags.outputs.feed_conversion_image_tag }}
          PREPARE_VIPER_IMAGE_TAG: ${{ steps.release_image_tags.outputs.viper_image_tag }}
        run: |
          set -euo pipefail
          test -n "${VIPER_BASE:-}" && test -n "${HMAC_SECRET:-}" && test -n "${DRAFT_ID:-}"
          python3 << 'PY'
          import hashlib, hmac, json, os, subprocess, sys, urllib.parse, urllib.request

          base = os.environ["VIPER_BASE"].rstrip("/")
          secret = os.environ["HMAC_SECRET"].encode("utf-8")
          draft = os.environ["DRAFT_ID"].strip()
          fc_tag = (os.environ.get("FEED_CONVERSION_TAG") or "").strip()
          fc_img = (os.environ.get("PREPARE_FEED_IMAGE_TAG") or "").strip()
          viper_img = (os.environ.get("PREPARE_VIPER_IMAGE_TAG") or "").strip()
          ws = os.environ.get("GITHUB_WORKSPACE", os.getcwd())

          get_sig = hmac.new(secret, draft.encode("utf-8"), hashlib.sha256).hexdigest()
          u = "{}/setup/app/internal/onboarding/{}/prepare-context/".format(base, draft)
          q = {}
          if fc_img:
              q["feed_conversion_tag"] = fc_img
          if viper_img:
              q["viper_image_tag"] = viper_img
          if q:
              u += "?" + urllib.parse.urlencode(q)
          req = urllib.request.Request(u, headers={"X-Onboarding-Signature": "sha256=" + get_sig})
          with urllib.request.urlopen(req, timeout=120) as resp:
              bundle = json.loads(resp.read().decode())

          ctx = bundle.get("cookiecutter")
          if not isinstance(ctx, dict):
              print("prepare-context missing cookiecutter dict", file=sys.stderr)
              sys.exit(1)
          ctx_path = os.path.join(os.environ["RUNNER_TEMP"], "onboarding_cookiecutter.json")
          with open(ctx_path, "w", encoding="utf-8") as fh:
              json.dump(ctx, fh, indent=2, sort_keys=True)

          env = os.environ.copy()
          root = os.path.join(ws, "viper")
          fc_candidate = os.path.join(ws, "feed-conversion")
          fc = fc_candidate if os.path.isdir(fc_candidate) else root
          out_json = os.path.join(os.environ["RUNNER_TEMP"], "ingest_body.json")
          cmd = [
              sys.executable,
              "-m",
              "onboarding.ci_render_merge",
              "--viper-root",
              root,
              "--fc-root",
              fc,
              "--context",
              ctx_path,
              "--write-proposed-json",
              out_json,
          ]
          env["PYTHONPATH"] = root
          subprocess.check_call(cmd, cwd=root, env=env)

          with open(out_json, encoding="utf-8") as fh:
              body_obj = json.load(fh)
          body = {
              "proposed_files": body_obj["proposed_files"],
              "feed_conversion_tag": bundle.get("feed_conversion_tag") or fc_img or fc_tag,
          }
          raw = json.dumps(body, separators=(",", ":"), sort_keys=True).encode("utf-8")
          ps = hmac.new(secret, raw, hashlib.sha256).hexdigest()
          post = urllib.request.Request(
              "{}/setup/app/internal/onboarding/{}/ingest-prepare/".format(base, draft),
              data=raw,
              headers={"Content-Type": "application/json", "X-Onboarding-Signature": "sha256=" + ps},
              method="POST",
          )
          with urllib.request.urlopen(post, timeout=300) as resp:
              print(resp.read().decode())
          PY

      - name: Viper prepare-context + ingest (server-only)
        if: ${{ env.VIPER_CHECKOUT_REPO == '' }}
        env:
          VIPER_BASE: ${{ secrets.VIPER_INTERNAL_BASE_URL }}
          HMAC_SECRET: ${{ secrets.ONBOARDING_INGEST_HMAC_SECRET }}
          DRAFT_ID: ${{ github.event.client_payload.draft_id }}
          FEED_CONVERSION_TAG: ${{ steps.fc_tag.outputs.tag }}
          PREPARE_FEED_IMAGE_TAG: ${{ steps.release_image_tags.outputs.feed_conversion_image_tag }}
          PREPARE_VIPER_IMAGE_TAG: ${{ steps.release_image_tags.outputs.viper_image_tag }}
        run: |
          test -n "$VIPER_BASE" && test -n "$HMAC_SECRET" && test -n "$DRAFT_ID"
          python3 << 'PY'
          import hashlib, hmac, json, os, sys, urllib.error, urllib.parse, urllib.request
          base = os.environ["VIPER_BASE"].rstrip("/")
          secret = os.environ["HMAC_SECRET"].encode("utf-8")
          draft = os.environ["DRAFT_ID"].strip()
          fc_tag = (os.environ.get("FEED_CONVERSION_TAG") or "").strip()
          fc_img = (os.environ.get("PREPARE_FEED_IMAGE_TAG") or "").strip()
          viper_img = (os.environ.get("PREPARE_VIPER_IMAGE_TAG") or "").strip()
          get_sig = hmac.new(secret, draft.encode("utf-8"), hashlib.sha256).hexdigest()
          u = "{}/setup/app/internal/onboarding/{}/prepare-context/".format(base, draft)
          q = {}
          if fc_img:
              q["feed_conversion_tag"] = fc_img
          if viper_img:
              q["viper_image_tag"] = viper_img
          if q:
              u += "?" + urllib.parse.urlencode(q)
          r = urllib.request.Request(u, headers={"X-Onboarding-Signature": "sha256=" + get_sig})
          with urllib.request.urlopen(r, timeout=120) as resp:
              bundle = json.loads(resp.read().decode())
          body = {
              "proposed_files": bundle["proposed_files"],
              "feed_conversion_tag": bundle.get("feed_conversion_tag") or fc_img or fc_tag,
          }
          raw = json.dumps(body, separators=(",", ":"), sort_keys=True).encode("utf-8")
          ps = hmac.new(secret, raw, hashlib.sha256).hexdigest()
          p = urllib.request.Request(
              "{}/setup/app/internal/onboarding/{}/ingest-prepare/".format(base, draft),
              data=raw,
              headers={"Content-Type": "application/json", "X-Onboarding-Signature": "sha256=" + ps},
              method="POST",
          )
          with urllib.request.urlopen(p, timeout=120) as resp:
              print(resp.read().decode())
          PY
