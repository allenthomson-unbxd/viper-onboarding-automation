name: Onboarding — prepare

on:
  repository_dispatch:
    types: [onboarding-prepare]

concurrency:
  group: onboarding-prepare-${{ github.event.client_payload.draft_id }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Show dispatch payload
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          echo "repository_dispatch payload:"
          echo "$PAYLOAD"

